{% extends 'base.html' %}
{% block title %}Добавить регион{% endblock %}
{% block page_title %}Добавить регион{% endblock %}

{% block content %}
<div class="card" style="max-width:400px">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Название региона</label>
        {{ form.name }}
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Порядок сортировки</label>
        {{ form.order }}
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{% url 'directory:list' %}" class="btn btn-outline-secondary">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
