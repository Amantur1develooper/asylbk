{% extends 'base.html' %}
{% block title %}Удалить запись{% endblock %}
{% block page_title %}Удалить запись{% endblock %}

{% block content %}
<div class="card">
  <div class="card-body text-center py-5">
    <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
    <h5 class="mt-3">Вы уверены?</h5>
    <p class="text-muted">Запись <strong>{{ org.name }}</strong> будет удалена.</p>
    <form method="post" class="d-inline-flex gap-2 mt-2">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger px-4">Да, удалить</button>
      <a href="{% url 'directory:detail' org.pk %}" class="btn btn-outline-secondary px-4">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
