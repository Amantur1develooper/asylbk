{% extends 'base.html' %}
{% block title %}Удалить напоминание{% endblock %}
{% block page_title %}Удалить напоминание{% endblock %}

{% block content %}
<div class="card">
  <div class="card-body text-center py-5">
    <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
    <h5 class="mt-3">Вы уверены?</h5>
    <p class="text-muted">Напоминание «{{ reminder.title }}» будет удалено.</p>
    <form method="post" class="d-inline-flex gap-2 mt-2">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger px-4">Да, удалить</button>
      <a href="{% url 'calendar1:reminder_list' %}" class="btn btn-outline-secondary px-4">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
